name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Test, Bump, Publish
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test

      - name: Bump version (conventional commits)
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Determine bump type from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
          fi
          if echo "$COMMITS" | grep -qE "^[a-f0-9]+ (feat|feature)(\(|!|:)"; then
            BUMP=minor
          elif echo "$COMMITS" | grep -qE "BREAKING CHANGE|!:"; then
            BUMP=major
          else
            BUMP=patch
          fi
          NEW_VERSION=$(npm version $BUMP --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION ($BUMP)"

      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag, push, release
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git add package.json
          git commit -m "chore: release ${VERSION} [skip ci]"
          git tag "${VERSION}"
          git push origin main --tags
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
